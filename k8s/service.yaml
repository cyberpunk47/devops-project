apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: blue-green-demo
  labels:
    app: frontend
spec:
  selector:
    app: frontend
    version: blue        # Switch here during blue-green deployment
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080      # Explicit NodePort to ensure easy, predictable access
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: blue-green-demo
  labels:
    app: backend
spec:
  selector:
    app: backend
    version: blue        # Switch here during blue-green deployment
  ports:
  - name: http
    port: 5000
    targetPort: 5000
  type: ClusterIP
